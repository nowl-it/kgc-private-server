name: Download game XAPK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Game version (e.g. 170.1.00)'
        required: true
        default: '170.1.00'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download game XAPK via kgc-cli
        run: |
          mkdir -p apk
          ./kgc-cli download -v "${{ github.event.inputs.version || '170.1.00' }}" -o apk/

      - name: Upload XAPK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-xapk
          path: apk/*.xapk
          retention-days: 7
