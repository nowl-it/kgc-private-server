name: Download game APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Game version to download (e.g. 170.1.00)'
        required: true
        default: '170.1.00'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install apkeep
        run: |
          curl -LO https://github.com/EFForg/apkeep/releases/download/0.16.0/apkeep-x86_64-unknown-linux-gnu
          chmod +x apkeep-x86_64-unknown-linux-gnu
          sudo mv apkeep-x86_64-unknown-linux-gnu /usr/local/bin/apkeep

      - name: Download game XAPK
        run: |
          mkdir -p apk
          apkeep -a "com.awesomepiece.castle@${{ github.event.inputs.version || '170.1.00' }}" -d apk-pure apk/

      - name: Upload XAPK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-xapk
          path: apk/*.xapk
          retention-days: 7
